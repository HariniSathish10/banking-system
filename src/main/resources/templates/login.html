<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Banking Login</title>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Segoe UI',sans-serif;

            height:100vh;

            background:
            linear-gradient(135deg,#021b79,#0575e6);

            display:flex;
            justify-content:center;
            align-items:center;

            overflow:hidden;
        }

        .login-container{

            width:430px;

            background:white;

            border-radius:22px;

            padding:45px;

            box-shadow:
            0 12px 35px rgba(0,0,0,0.35);

            text-align:center;
        }

        .bank-icon{

            width:95px;
            height:95px;

            background:#eef4ff;

            border-radius:50%;

            display:flex;
            justify-content:center;
            align-items:center;

            margin:auto;

            font-size:42px;

            color:#005bea;
        }

        h1{

            margin-top:22px;

            color:#003087;

            font-size:38px;
        }

        .subtitle{

            color:gray;

            margin-top:8px;

            margin-bottom:35px;

            font-size:16px;
        }

        .input-box{

            position:relative;

            margin-bottom:22px;
        }

        .input-box i{

            position:absolute;

            left:15px;
            top:18px;

            color:#777;
        }

        .input-box input{

            width:100%;

            padding:16px 16px 16px 48px;

            border:1px solid #d0d0d0;

            border-radius:12px;

            font-size:16px;

            outline:none;

            transition:0.3s;
        }

        .input-box input:focus{

            border-color:#006eff;

            box-shadow:
            0 0 8px rgba(0,110,255,0.3);
        }

        .login-btn{

            width:100%;

            padding:16px;

            border:none;

            border-radius:12px;

            background:
            linear-gradient(to right,#0048ff,#006eff);

            color:white;

            font-size:18px;

            font-weight:600;

            cursor:pointer;

            transition:0.3s;
        }

        .login-btn:hover{

            transform:translateY(-3px);

            box-shadow:
            0 8px 18px rgba(0,72,255,0.3);
        }

        .extra{

            margin-top:25px;

            color:#666;

            font-size:15px;
        }

        .extra a{

            color:#005bea;

            text-decoration:none;

            font-weight:600;
        }

        .secure{

            margin-top:20px;

            color:#008f5a;

            font-size:15px;
        }

    </style>

</head>

<body>

<div class="login-container">

    <div class="bank-icon">
        <i class="fa-solid fa-building-columns"></i>
    </div>

    <h1>Welcome Back</h1>

    <p class="subtitle">
        Secure Login to Banking System
    </p>
       <p style="color:red;" th:text="${error}"></p>

      <form action="/login" method="post">

        <div class="input-box">

            <i class="fa-solid fa-user"></i>

            <input type="text"
             name="username"
           placeholder="Enter Username">
        </div>

        <div class="input-box">

            <i class="fa-solid fa-lock"></i>

             <input type="password"
          name="password"
          placeholder="Enter Password">
        </div>

        <button class="login-btn">
            Login
        </button>

    </form>

    <div class="extra">
        Forgot Password?
        <a href="#">Reset</a>
    </div>

    <div class="secure">
        <i class="fa-solid fa-shield-halved"></i>
        Secure Banking Access
    </div>

</div>

</body>
</html>
