<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Accounts Dashboard</title>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Segoe UI',sans-serif;

            background:
            linear-gradient(135deg,#021b79,#0575e6);

            min-height:100vh;

            padding:40px;
        }

        .header{

            display:flex;

            justify-content:space-between;

            align-items:center;

            color:white;

            margin-bottom:35px;
        }

        .header h1{

            font-size:42px;

            display:flex;

            align-items:center;

            gap:15px;
        }

        .back-btn{

            background:white;

            color:#005bea;

            padding:12px 22px;

            border-radius:10px;

            text-decoration:none;

            font-weight:600;

            transition:0.3s;
        }

        .back-btn:hover{

            transform:translateY(-3px);

            box-shadow:
            0 6px 15px rgba(0,0,0,0.2);
        }

        .table-container{

            background:white;

            border-radius:22px;

            overflow:hidden;

            box-shadow:
            0 12px 35px rgba(0,0,0,0.25);
        }

        table{

            width:100%;

            border-collapse:collapse;
        }

        thead{

            background:
            linear-gradient(to right,#0048ff,#006eff);

            color:white;
        }

        th{

            padding:22px;

            font-size:18px;

            text-align:center;
        }

        td{

            padding:20px;

            text-align:center;

            font-size:17px;

            border-bottom:1px solid #eee;
        }

        tbody tr{

            transition:0.3s;
        }

        tbody tr:hover{

            background:#f4f8ff;

            transform:scale(1.01);
        }

        .amount{

            color:#00a86b;

            font-weight:bold;
        }

        .type{

            background:#eef4ff;

            color:#0048ff;

            padding:8px 15px;

            border-radius:20px;

            font-weight:600;
        }

        .footer{

            text-align:center;

            margin-top:25px;

            color:white;

            font-size:16px;
        }

    </style>

</head>

<body>

<div class="header">

    <h1>

        <i class="fa-solid fa-building-columns"></i>

        Customer Accounts

    </h1>

    <a href="/home" class="back-btn">

        <i class="fa-solid fa-arrow-left"></i>

        Back Dashboard

    </a>

</div>

<div class="table-container">

    <table>

        <thead>

        <tr>

            <th>ID</th>

            <th>Account Number</th>

            <th>Customer Name</th>

            <th>Balance</th>

            <th>Account Type</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="acc : ${accounts}">

            <td th:text="${acc.id}"></td>

            <td th:text="${acc.accountNumber}"></td>

            <td th:text="${acc.customerName}"></td>

            <td class="amount">

                ₹ <span th:text="${acc.balance}"></span>

            </td>

            <td>

                <span class="type"
                th:text="${acc.accountType}"></span>

            </td>

        </tr>

        </tbody>

    </table>

</div>

<div class="footer">

    © 2025 Secure Banking System

</div>

</body>

</html>
